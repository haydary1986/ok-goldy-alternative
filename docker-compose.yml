# Goldy — Coolify-compatible docker-compose.
# Coolify injects every environment variable defined in its UI into the host
# environment of the compose run, so ${VAR} interpolation works for all
# services.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goldy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-goldy}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goldy} -d ${POSTGRES_DB:-goldy}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    entrypoint: ["/app/migrate", "up"]
    environment:
      GOLDY_DATABASE_URL: ${GOLDY_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build: .
    entrypoint: ["/app/server"]
    environment:
      GOLDY_HTTP_ADDR: ${GOLDY_HTTP_ADDR:-0.0.0.0:8080}
      GOLDY_LOG_LEVEL: ${GOLDY_LOG_LEVEL:-info}
      GOLDY_LOG_FORMAT: ${GOLDY_LOG_FORMAT:-json}
      GOLDY_DATABASE_URL: ${GOLDY_DATABASE_URL}
      GOLDY_REDIS_ADDR: ${GOLDY_REDIS_ADDR:-redis:6379}
      GOLDY_REDIS_PASSWORD: ${GOLDY_REDIS_PASSWORD:-}
      GOLDY_REDIS_DB: ${GOLDY_REDIS_DB:-0}
      GOLDY_GOOGLE_SA_KEY_FILE: ${GOLDY_GOOGLE_SA_KEY_FILE:-/secrets/service-account.json}
      GOLDY_GOOGLE_DELEGATED_ADMIN: ${GOLDY_GOOGLE_DELEGATED_ADMIN:-}
      GOLDY_GOOGLE_CUSTOMER_ID: ${GOLDY_GOOGLE_CUSTOMER_ID:-my_customer}
      GOLDY_RATE_LIMIT_RPS: ${GOLDY_RATE_LIMIT_RPS:-20}
      GOLDY_RATE_LIMIT_BURST: ${GOLDY_RATE_LIMIT_BURST:-40}
      GOLDY_BASIC_AUTH_USER: ${GOLDY_BASIC_AUTH_USER:-}
      GOLDY_BASIC_AUTH_PASSWORD: ${GOLDY_BASIC_AUTH_PASSWORD:-}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    entrypoint: ["/app/worker"]
    environment:
      GOLDY_LOG_LEVEL: ${GOLDY_LOG_LEVEL:-info}
      GOLDY_LOG_FORMAT: ${GOLDY_LOG_FORMAT:-json}
      GOLDY_DATABASE_URL: ${GOLDY_DATABASE_URL}
      GOLDY_REDIS_ADDR: ${GOLDY_REDIS_ADDR:-redis:6379}
      GOLDY_REDIS_PASSWORD: ${GOLDY_REDIS_PASSWORD:-}
      GOLDY_REDIS_DB: ${GOLDY_REDIS_DB:-0}
      GOLDY_GOOGLE_SA_KEY_FILE: ${GOLDY_GOOGLE_SA_KEY_FILE:-/secrets/service-account.json}
      GOLDY_GOOGLE_DELEGATED_ADMIN: ${GOLDY_GOOGLE_DELEGATED_ADMIN:-}
      GOLDY_GOOGLE_CUSTOMER_ID: ${GOLDY_GOOGLE_CUSTOMER_ID:-my_customer}
      GOLDY_RATE_LIMIT_RPS: ${GOLDY_RATE_LIMIT_RPS:-20}
      GOLDY_RATE_LIMIT_BURST: ${GOLDY_RATE_LIMIT_BURST:-40}
      GOLDY_WORKER_CONCURRENCY: ${GOLDY_WORKER_CONCURRENCY:-10}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
