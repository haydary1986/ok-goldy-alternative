services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: goldy
      POSTGRES_PASSWORD: goldy
      POSTGRES_DB: goldy
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldy -d goldy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    entrypoint: ["/app/migrate", "up"]
    environment:
      GOLDY_DATABASE_URL: postgres://goldy:goldy@postgres:5432/goldy?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build: .
    entrypoint: ["/app/server"]
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/server", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    entrypoint: ["/app/worker"]
    env_file: .env
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
